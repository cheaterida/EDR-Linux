name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  gate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: go fmt
        run: |
          test -z "$(gofmt -l . 2>/dev/null | grep -v '.tools/')" && echo "fmt clean"

      - name: go vet
        run: |
          go vet ./internal/integrity/... ./internal/fanotify/... ./internal/eventlog/...

      - name: go test
        run: |
          go test ./internal/integrity/... ./internal/eventlog/... -count=1
