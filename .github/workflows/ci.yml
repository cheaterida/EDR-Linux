name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  gate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: go vet
        run: go vet ./internal/integrity/... ./internal/eventlog/...

      - name: go test
        run: go test ./internal/integrity/... ./internal/eventlog/... -count=1
