name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  gate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libbpf-dev clang llvm bpftool

      - name: Generate vmlinux.h (from bundled or fake)
        run: |
          # GitHub runners don't have /sys/kernel/btf — use a minimal stub
          if [ -f /sys/kernel/btf/vmlinux ]; then
            make bpf-vmlinux
          else
            echo "GitHub runner: no BTF, using minimal vmlinux stub"
            cat > internal/bpf/probes/vmlinux.h << 'EOF'
          #ifndef __VMLINUX_H__
          #define __VMLINUX_H__
          typedef unsigned char __u8;
          typedef unsigned short __u16;
          typedef unsigned int __u32;
          typedef unsigned long long __u64;
          typedef __signed__ char __s8;
          typedef short __s16;
          typedef int __s32;
          typedef long long __s64;
          typedef __u32 __wsum;
          typedef __u64 __be64;
          typedef __u32 __be32;
          typedef __u16 __be16;
          typedef __u64 __le64;
          typedef __u32 __le32;
          typedef __u16 __le16;
          #include <linux/types.h>
          struct pt_regs {};
          struct trace_event_raw_sched_process_exec {};
          struct trace_event_raw_sys_enter {};
          struct task_struct {};
          struct kernel_siginfo {};
          struct cred {};
          struct bpf_prog {};
          struct bpf_map {};
          union bpf_attr {};
          #endif
          EOF
          fi

      - name: bpf-build (compile only)
        run: |
          export GO=/usr/bin/go
          make bpf-build

      - name: go vet (non-BPF packages)
        run: |
          go vet ./internal/integrity/... ./internal/fanotify/... ./internal/eventlog/... 2>&1

      - name: go test (non-BPF packages)
        run: |
          go test ./internal/integrity/... ./internal/eventlog/... -count=1 -v 2>&1 | tail -30

      - name: go fmt
        run: |
          test -z "$(gofmt -l . 2>/dev/null | grep -v '.tools/' | grep -v 'vmlinux.h')" && echo "fmt clean"
